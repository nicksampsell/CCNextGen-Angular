@if (pagination.totalPages) {
  <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
    <nav aria-label="Page navigation" class="flex-grow-1 align-items-center">
      <ul class="pagination justify-content-start align-items-center">
        <!-- First page -->
        <li class="page-item" [class.disabled]="pagination.currentPage === 1">
          <a class="page-link pb-0 px-1" href="#" (click)="goToPage(1); $event.preventDefault()">
            <span class="material-symbols-outlined pb-0">keyboard_double_arrow_left</span>
            <span class="visually-hidden">First</span>
          </a>
        </li>

        <!-- Previous -->
        <li class="page-item" [class.disabled]="pagination.currentPage === 1">
          <a
            class="page-link pb-0 px-1"
            href="#"
            (click)="goToPage(pagination.currentPage - 1); $event.preventDefault()"
          >
            <span class="material-symbols-outlined pb-0">keyboard_arrow_left</span>
            <span class="visually-hidden">Previous</span>
          </a>
        </li>

        <!-- Page numbers -->
        @for (page of getDisplayPages(); track page; let i = $index) {
          <li class="page-item" [class.active]="page === pagination.currentPage">
            <a class="page-link" href="#" (click)="goToPage(Number(page)); $event.preventDefault()">
              {{ page }}
            </a>
          </li>
        }

        <!-- Next -->
        <li class="page-item" [class.disabled]="pagination.currentPage === pagination.totalPages">
          <a
            class="page-link pb-0 px-1"
            href="#"
            (click)="goToPage(pagination.currentPage + 1); $event.preventDefault()"
          >
            <span class="material-symbols-outlined pb-0">keyboard_arrow_right</span>
            <span class="visually-hidden">Next</span>
          </a>
        </li>

        <!-- Last page -->
        <li class="page-item" [class.disabled]="pagination.currentPage === pagination.totalPages">
          <a
            class="page-link pb-0 px-1"
            href="#"
            (click)="goToPage(pagination.totalPages); $event.preventDefault()"
          >
            <span class="material-symbols-outlined pb-0">keyboard_double_arrow_right</span>
            <span class="visually-hidden">Last</span>
          </a>
        </li>
      </ul>
    </nav>
    <div class="d-flex justify-content-start gap-2 align-items-center">
      <label for="perPage" class="form-label text-nowrap">Items per page:</label>
      <select id="perPage" class="form-select" (change)="changePerPage($event)">
        <option value="10" [selected]="perPage == 10">10 Items</option>
        <option value="50" [selected]="perPage == 25 || !perPage">25 Items</option>
        <option value="50" [selected]="perPage == 50">50 Items</option>
        <option value="100" [selected]="perPage == 100">100 Items</option>
        <option value="200" [selected]="perPage == 200">200 Items</option>
      </select>
    </div>
  </div>
}
