<header class="d-flex flex-row justify-content-between align-items-center mb-3">
  <div class="grow">
    <h1 class="display-3">
      @if (titleLinkUrl) {
        <a [routerLink]="titleLinkUrl">
          <ng-container *ngTemplateOutlet="titleContent"></ng-container>
        </a>
      } @else {
        <ng-container *ngTemplateOutlet="titleContent"></ng-container>
      }
    </h1>
  </div>
  <div class="d-flex flex-row align-items-center gap-3">
    @if (getButtons) {
      @for (button of getButtons; track button) {
        <a
          [class]="['btn', buttonClass(button.color, button.colorAsOutline), 'has-icon']"
          (click)="navigate(button)"
        >
          @if (!!button.icon) {
            <i class="material-symbols-outlined">{{ button.icon }}</i>
          }
          <span>{{ button.title }}</span>
        </a>
      }
    }
  </div>
</header>
<ng-template #titleContent>
  <ng-content></ng-content>
</ng-template>
