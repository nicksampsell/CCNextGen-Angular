<div class="d-flex justify-content-end align-items-center gap-1 align-self-end">
  @if (showEdit) {
    <button
      [class]="['btn', 'btn-sm', getColorClass(editColor), getButtonSize()]"
      (click)="onEdit()"
    >
      Edit
    </button>
  }

  @if (showDetails) {
    <button
      [class]="['btn', 'btn-sm', getColorClass(detailsColor), getButtonSize()]"
      (click)="onDetails()"
    >
      Details
    </button>
  }

  @if (showDelete) {
    <button
      [class]="['btn', 'btn-sm', getColorClass(deleteColor), getButtonSize()]"
      (click)="onDelete()"
    >
      Delete
    </button>
  }
</div>
